<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="css/signup.css" rel="stylesheet">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" id="mainNav">
    <a class="navbar-brand" href="index.html">Work & Study</a>
  </nav>

  <section class="page-section" id="contact">

    <div class="container px-4 px-lg-5">

      <div class="login-box">

        <h2 class="login-title">회원가입</h2>

        <form>
          <input class="login-input" type="text" placeholder="아이디" required>

          <input class="login-input" type="password" placeholder="비밀번호" required>

          <input class="login-input" type="password" placeholder="비밀번호 확인" required>

          <input class="login-input" type="email" placeholder="이메일 주소" required>

          <input class="login-input" type="text" placeholder="주소" required>

          <input class="login-input" type="tel" placeholder="전화번호 (예: 010-0000-0000)" required>

          <button type="submit" class="login-button signup-btn">
            회원가입 완료
          </button>

          <div class="login-links" style="text-align:center; margin-top:20px;">
            <a href="login.html">이미 계정이 있으신가요? 로그인하기</a>
          </div>

        </form>

      </div>

    </div>

  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/SimpleLightbox/2.1.0/simpleLightbox.min.js"></script>
  <script src="js/scripts.js"></script>
  <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>

</body>
</html>
