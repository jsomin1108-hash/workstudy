<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지도 확대 보기</title>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c70f235dc9c2a8664cb7dd21bd9a06b0"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        /* 돌아가기 버튼 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;

            width: 40px;
            height: 40px;

            border: none;
            border-radius: 1px;

            background-color: white;

            font-size: 20px;
            cursor: pointer;

            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);

            z-index: 10;
        }

        .back-btn:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>

<body>

    <button class="back-btn" onclick="history.back()">
        ←
    </button>


    <div id="map"></div>

    <script>
    const markerData = JSON.parse(
        sessionStorage.getItem("markerData") || "[]"
    );

    const map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(37.5007, 127.0365),
        level: 5
    });

    const zoomControl = new kakao.maps.ZoomControl();

    map.addControl(
        zoomControl,
        kakao.maps.ControlPosition.RIGHT
    );

    marker.setMap(map);

    </script>

</body>

</html>
