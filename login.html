<!DOCTYPE html>
<html>
<head>
    <title>로그인</title>
    <style>
        @font-face {
            font-family: 'Suit';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Thin.woff2') format('woff2');
            font-weight: 100;
            font-display: swap;
        }

        @font-face {
            font-family: 'Suit';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Suit';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Bold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        body{
            margin:0;
            background:#f6f2eb;
            font-family:'Suit', sans-serif;
        }


        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: #4A4A4A;
            text-decoration: none;
            padding: 0.3125rem;
            margin-left: 10%;
        }

        .navbar-brand:hover {
            color: rgba(0, 0, 0, 0.9);
        }
        

        .container {
            margin: 20px;
        }

        .login-box {
            max-width: 520px;
            margin: 0 auto;
            margin-top: 5%;
            text-align: center;
        }

        .login-title {
            display: flex;
            align-items: center;
            justify-content: center;

            width: 320px;
            height: 80px;

            margin: 0 auto 60px;

            border: 2px solid #4E6B43;
            border-radius: 12px;

            background-color: #4E6B43;
            color: white;

            font-size: 1.8rem;
            font-weight: 700;
        }

        .login-input {
            width: 420px;
            height: 70px;

            display: block;
            margin: 0 auto 28px;

            border: 2px solid #4E6B43;
            border-radius: 12px;

            background: #fff;
            color: #222;

            padding: 0 25px;
            margin-bottom: 28px;

            font-size: 1.2rem;
        }

        .login-button {
            display: flex;
            align-items: center;
            justify-content: center;

            text-decoration: none;

            width: 200px;
            height: 60px;

            border: 2px solid #4E6B43;
            border-radius: 12px;

            background: #4E6B43;
            color: white;

            font-size: 1.3rem;
            font-weight: 700;

            margin: 18px auto 0 auto;
            
            margin-top: 18px;

            transition: 0.3s;
        }

        .login-button:hover {
            background: #6b8563;
            color: white;
        }

        .login-links {
            text-align: center;
            margin: 28px 0 36px;
            font-size: 1.05rem;
        }

        .login-links a:hover {
        text-decoration: underline;
        }

        .login-links a {
            color: #111;
            text-decoration: none;
            margin: 0 8px;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 18px;

            margin: 35px 0 28px;
        }

        .login-divider span {
            flex: 1;
            height: 1px;

            background: #4E6B43;
        }

        .login-divider p {
            margin: 0;
            font-size: 1rem;
        }

        .social-login {
            display: flex;
            align-items: center;
            justify-content: center;

            text-decoration: none;

            width: 300px;
            height: 50px;

            margin: 16px auto;

            border: 2px solid #4E6B43;
            border-radius: 12px;

            background: #4E6B43;
            color: white;

            font-size: 1rem;

            transition: 0.3s;
        }

        .social-login:hover {
            background: #6b8563;
            color: rgb(255, 255, 255);
            text-decoration: underline;
        }

        .cafe-card-link {
            text-decoration: none;
            color: inherit;
        }

        .cafe-card-link:hover {
            color: inherit;
        }
    </style>
</head>
<body>
        <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" id="mainNav">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html">Work & Study</a>

    <section class="page-section" id="contact">
        <div class="container px-4 px-lg-5">

            <div class="login-box">

                <h2 class="login-title">로그인 및 회원가입</h2>

                <form>
                    <input class="login-input" type="text" placeholder="아이디">
                    <input class="login-input" type="password" placeholder="비밀번호">

                    <a href="main.html" class="login-button">로그인</a>

                    <div class="login-links">
                    <a href="signup.html">회원가입</a>
                    <span>|</span>
                    <a href="find_account.html">아이디/비밀번호 찾기</a>
                    </div>

                    <div class="login-divider">
                        <span></span>
                        <p>또는</p>
                        <span></span>
                    </div>

                    <a href="#" class="social-login">G　구글 계정으로 로그인</a>
                    <a href="#" class="social-login">N　네이버 계정으로 로그인</a>
                    <a href="#" class="social-login">💬　카카오톡 계정으로 로그인</a>
                </form>
</body>
</html>
