<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>현재 위치 지도 (UI)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/map.css">


    <script type="text/javascript" 
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c70f235dc9c2a8664cb7dd21bd9a06b0&libraries=services">
    </script>
</head>

<body>


<div class="top-bar">
    <div class="address-box">
        <span id="address">서울특별시 강남구</span>
        <a id="confirmBtn" href="result.html">확인</a>
    </div>
</div>


<div id="map"></div>

<script>

let map;


const lat = 37.5006;
const lng = 127.0366;

window.onload = function () {

    const container = document.getElementById("map");

    const option = {
        center: new kakao.maps.LatLng(lat, lng),
        level: 3
    };

    map = new kakao.maps.Map(container, option);


    new kakao.maps.Marker({
        position: new kakao.maps.LatLng(lat, lng),
        map: map
    });
};

</script>

</body>
</html>
